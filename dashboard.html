<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tayabas-Lucban Road Inventory Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .stat-card { border-radius: 12px; border: none; color: white; transition: 0.3s; }
        .card-title { font-size: 0.9rem; opacity: 0.9; }
        .card-value { font-size: 1.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h2 class="mb-4 text-primary">Road Inventory Dashboard</h2>
        
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card stat-card bg-primary p-3">
                    <div class="card-title">TOTAL ROAD LENGTH</div>
                    <div class="card-value">16.10 km</div>
                    <div>810 segments</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card bg-success p-3">
                    <div class="card-title">GOOD ROADS</div>
                    <div class="card-value">80.4%</div>
                    <div>651 segments</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card bg-info p-3">
                    <div class="card-title">CONCRETE SURFACE</div>
                    <div class="card-value">46.7%</div>
                    <div>378 segments</div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card p-3 shadow-sm">
                    <h5>Road Condition Distribution</h5>
                    <canvas id="conditionChart"></canvas>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card p-3 shadow-sm">
                    <h5>Elevation Statistics (meters)</h5>
                    <div class="d-flex justify-content-around text-center mt-4">
                        <div><h6>Avg</h6><p class="h4 text-primary">220.0</p></div>
                        <div><h6>Min</h6><p class="h4 text-secondary">131.4</p></div>
                        <div><h6>Max</h6><p class="h4 text-danger">384.0</p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Condition Pie Chart
        const ctx = document.getElementById('conditionChart').getContext('2d');
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Good', 'Fair', 'Poor'],
                datasets: [{
                    data: [80.4, 18.0, 1.6],
                    backgroundColor: ['#28a745', '#ff9800', '#dc3545']
                }]
            }
        });
    </script>
</body>
</html>
