<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; background-color: #ffffff; }

        .dashboard-btn {
            position: absolute; top: 15px; right: 60px; z-index: 5000; 
            background: #2b3d51; color: #ffffff !important; 
            padding: 10px 18px; border-radius: 8px; text-decoration: none !important; 
            font-family: 'Segoe UI', sans-serif; font-weight: bold; font-size: 13px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 8px;
        }

        .north-arrow-container {
            position: absolute !important; bottom: 25px !important; right: 25px !important; z-index: 5000;
        }

        /* Enhanced Scale Box */
        .custom-scale-ratio {
            position: absolute !important; bottom: 25px !important; left: 25px !important; z-index: 5001 !important;
            background: rgba(255, 255, 255, 0.95); padding: 6px 15px; border: 2px solid #333;
            font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; color: #000;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .ol-scale-line, .ol-attribution { display: none !important; }
        </style>
        <title>Tayabas–Lucban Bypass Road Inventory</title>
    </head>
    <body>
        <div id="map">
            <a href="dashboard.html" class="dashboard-btn">
                <i class="fas fa-chart-bar"></i> DASHBOARD
            </a>
            <div id="scale-ratio" class="custom-scale-ratio">Scale 1:Calculating...</div>
            <div class="north-arrow-container">
                <svg width="60" height="60" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="white" fill-opacity="0.4" />
                    <path d="M50 5 L65 45 L50 38 L35 45 Z" fill="#e74c3c" stroke="black" />
                    <path d="M50 95 L35 55 L50 62 L65 55 Z" fill="#2c3e50" stroke="black" />
                    <text x="44" y="28" font-family="Arial" font-size="14" font-weight="bold">N</text>
                </svg>
            </div>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="resources/proj4.js"></script>
        <script>proj4.defs('EPSG:4326','+proj=longlat +datum=WGS84 +no_defs');</script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="./resources/Autolinker.min.js"></script>
        <script src="layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/qgis2web.js"></script>
        
        <script>
            window.onload = function() {
                if (typeof map !== 'undefined') {
                    function updateScale() {
                        var view = map.getView();
                        var res = view.getResolution();
                        var proj = view.getProjection();
                        var center = view.getCenter();
                        
                        // Use a fixed DPI of 96 for standard web display
                        var dpi = 96; 
                        var inchesPerMeter = 39.3701;
                        
                        // Calculate point resolution to handle WGS84 distortion in Tayabas
                        var mpu = ol.proj.getPointResolution(proj, res, center);
                        var scale = (res / mpu) * mpu * inchesPerMeter * dpi;
                        
                        // If scale is too small (e.g. 1:4), it's likely a calculation error before zoom
                        // We round to the nearest 10 or 100 for a cleaner engineering look
                        var finalScale = Math.round(scale);
                        
                        if (finalScale < 10) {
                             document.getElementById('scale-ratio').innerHTML = "Scale 1:---";
                        } else {
                             document.getElementById('scale-ratio').innerHTML = "Scale 1:" + finalScale.toLocaleString();
                        }
                    }
                    map.getView().on('change:resolution', updateScale);
                    updateScale();
                }
            };
        </script>
    </body>
</html>
