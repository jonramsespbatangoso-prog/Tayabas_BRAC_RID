<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body, #map {
            width: 100%; height: 100%; padding: 0; margin: 0;
            background-color: #ffffff;
        }

        /* Dashboard Button */
        .dashboard-btn {
            position: absolute; 
            top: 15px; 
            right: 60px; 
            z-index: 5000; 
            background: #2b3d51; 
            color: #ffffff !important; 
            padding: 10px 18px; 
            border-radius: 8px; 
            text-decoration: none !important; 
            font-family: 'Segoe UI', sans-serif; 
            font-weight: bold; 
            font-size: 13px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 8px;
        }

        /* North Arrow - Bottom Right */
        .north-arrow-container {
            position: absolute;
            bottom: 20px; 
            right: 20px;
            z-index: 5000;
        }
        .north-arrow-svg {
            width: 50px;
            height: 50px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.4));
        }

        /* Compact Scale Line - Bottom Left */
        .ol-scale-line {
            left: 15px !important;
            bottom: 15px !important;
            background: rgba(255, 255, 255, 0.7) !important;
            border: 1px solid #333 !important;
            border-radius: 0px !important;
            padding: 0px 2px !important;
            z-index: 5000 !important;
        }
        .ol-scale-line-inner {
            border: 1px solid #333 !important;
            border-top: none !important;
            color: #000 !important;
            font-size: 9px !important;
            font-weight: bold !important;
            margin: 1px !important;
        }
        </style>
        <title>Tayabas–Lucban Bypass Road Inventory</title>
    </head>
    <body>
        <div id="map">
            <a href="dashboard.html" class="dashboard-btn">
                <i class="fas fa-chart-bar"></i> DASHBOARD
            </a>

            <div class="north-arrow-container">
                <svg class="north-arrow-svg" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="white" fill-opacity="0.2" />
                    <path d="M50 5 L65 45 L50 38 L35 45 Z" fill="#e74c3c" stroke="black" stroke-width="1"/>
                    <path d="M50 95 L35 55 L50 62 L65 55 Z" fill="#2c3e50" stroke="black" stroke-width="1"/>
                    <text x="44" y="28" font-family="Arial" font-size="14" font-weight="bold" fill="black">N</text>
                </svg>
            </div>

            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="resources/proj4.js"></script>
        <script>proj4.defs('EPSG:4326','+proj=longlat +datum=WGS84 +no_defs');</script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="layers/TayabasAdministrativeMap_1.js"></script>
        <script src="layers/Elevation_2.js"></script>
        <script src="layers/SurfaceType_3.js"></script>
        <script src="layers/RoadCondition_4.js"></script>
        <script src="layers/RoadClassification_5.js"></script>
        <script src="layers/RoadinventoryDatabase_6.js"></script>
        <script src="styles/TayabasAdministrativeMap_1_style.js"></script>
        <script src="styles/Elevation_2_style.js"></script>
        <script src="styles/SurfaceType_3_style.js"></script>
        <script src="styles/RoadCondition_4_style.js"></script>
        <script src="styles/RoadClassification_5_style.js"></script>
        <script src="styles/RoadinventoryDatabase_6_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>
        
        <script>
            // Initialize Scale Control on the Bottom Left
            var scaleLineControl = new ol.control.ScaleLine({
                units: 'metric',
                minWidth: 80
            });
            map.addControl(scaleLineControl);
        </script>
    </body>
</html>
