<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            background-color: #ffffff;
        }

        /* Dashboard Button */
        .dashboard-btn {
            position: absolute; 
            top: 15px; 
            right: 60px; /* Adjusted to not block zoom controls */
            z-index: 5000; 
            background: #2b3d51; 
            color: #ffffff !important; 
            padding: 10px 18px; 
            border-radius: 8px; 
            text-decoration: none !important; 
            font-family: 'Segoe UI', sans-serif; 
            font-weight: bold; 
            font-size: 13px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* The Legend */
        .custom-legend {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 5000;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 5px;
            border: 2px solid #333;
            font-family: Arial, sans-serif;
            font-size: 12px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .box { width: 20px; height: 10px; margin-right: 8px; border: 1px solid #000; }

        /* North Arrow & Scale Bar */
        .map-tools-left {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 5000;
            pointer-events: none; /* Allows clicking through to map if needed */
        }
        .north-arrow-img {
            width: 50px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }
        .scale-info {
            background: rgba(255,255,255,0.8);
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #333;
            display: block;
            margin-top: 5px;
            width: fit-content;
        }
        </style>
        <title>Tayabas–Lucban Bypass Road Inventory</title>
    </head>
    <body>
        <div id="map">
            <a href="dashboard.html" class="dashboard-btn">
                <i class="fas fa-chart-bar"></i> DASHBOARD
            </a>

            <div class="custom-legend">
                <strong>ROAD CONDITION</strong><br>
                <div class="legend-item"><span class="box" style="background:#27ae60"></span> Good</div>
                <div class="legend-item"><span class="box" style="background:#f39c12"></span> Fair</div>
                <div class="legend-item"><span class="box" style="background:#e74c3c"></span> Poor</div>
                <hr style="margin:5px 0">
                <strong>SURFACE TYPE</strong><br>
                <div class="legend-item"><span class="box" style="background:#c0392b"></span> Asphalt</div>
                <div class="legend-item"><span class="box" style="background:#bdc3c7"></span> Concrete</div>
            </div>

            <div class="map-tools-left">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Compass_Rose_North_Simple.svg" class="north-arrow-img">
                <div class="scale-info">MSEUF GE: 1:500</div>
            </div>

            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="resources/proj4.js"></script>
        <script>proj4.defs('EPSG:4326','+proj=longlat +datum=WGS84 +no_defs');</script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="layers/TayabasAdministrativeMap_1.js"></script>
        <script src="layers/Elevation_2.js"></script>
        <script src="layers/SurfaceType_3.js"></script>
        <script src="layers/RoadCondition_4.js"></script>
        <script src="layers/RoadClassification_5.js"></script>
        <script src="layers/RoadinventoryDatabase_6.js"></script>
        <script src="styles/TayabasAdministrativeMap_1_style.js"></script>
        <script src="styles/Elevation_2_style.js"></script>
        <script src="styles/SurfaceType_3_style.js"></script>
        <script src="styles/RoadCondition_4_style.js"></script>
        <script src="styles/RoadClassification_5_style.js"></script>
        <script src="styles/RoadinventoryDatabase_6_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>          
    </body>
</html>
